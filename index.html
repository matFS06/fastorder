<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>FastOrder</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">

    <div class="login-box">

        <h1>🍔 FastOrder</h1>

        <button
        class="btn btn-warning w-100 mb-3"
        onclick="entrarCliente()">

        Sou Cliente

        </button>

        <button
        class="btn btn-secondary w-100"
        onclick="entrarFuncionario()">

        Sou Funcionário

        </button>

    </div>

</div>

<!-- CLIENTE -->
<div id="menuScreen" class="hidden">

<nav class="navbar navbar-dark px-4">

<div class="d-flex justify-content-between w-100">

<h3>🍔 Cardápio Digital</h3>

<button
class="btn btn-light"
onclick="voltarInicio()">

🏠

</button>

</div>

</nav>

<div class="container mt-5">
<div class="row" id="foods"></div>
</div>

<div class="cart">

<h4>🛒 Pedido</h4>

<ul id="cartItems"></ul>

<h5>Total: R$ <span id="total">0</span></h5>

<input
type="text"
id="nomeCliente"
class="form-control mt-3"
placeholder="Seu nome">

<select
id="pagamento"
class="form-select mt-2">

<option value="" selected disabled>
💳 Forma de pagamento
</option>

<option value="Pix">
Pix
</option>

<option value="Dinheiro">
Dinheiro
</option>

<option value="Cartão">
Cartão
</option>

</select>

<button
class="btn btn-order w-100 mt-3"
onclick="finalizarPedido()">

Finalizar Pedido

</button>

</div>

</div>

<!-- FUNCIONARIO -->
<div id="funcionarioScreen" class="hidden">

<nav class="navbar navbar-dark px-4">

<div class="d-flex justify-content-between w-100">

<h3>👨‍🍳 Painel Funcionário</h3>

<button
class="btn btn-light"
onclick="voltarInicio()">

🏠

</button>

</div>

</nav>

<div class="container mt-5">

<div id="listaPedidos"></div>

</div>

</div>

<script src="js/script.js"></script>

</body>
</html>
